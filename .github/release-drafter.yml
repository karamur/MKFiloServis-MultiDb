name-template: 'v$RESOLVED_VERSION 🚀'
tag-template: 'v$RESOLVED_VERSION'
tag-prefix: 'v'

categories:
  - title: '💥 Breaking Changes'
    labels:
      - 'breaking-change'
  - title: '✨ Yeni Özellikler'
    labels:
      - 'type: feature'
      - 'type: enhancement'
  - title: '🐛 Hata Düzeltmeleri'
    labels:
      - 'type: bug'
  - title: '⚡ Performans'
    labels:
      - 'type: performance'
  - title: '🛡️ Güvenlik'
    labels:
      - 'type: security'
  - title: '♻️ Refactor'
    labels:
      - 'type: refactor'
  - title: '📝 Dokümantasyon'
    labels:
      - 'type: docs'
  - title: '🧪 Testler'
    labels:
      - 'type: test'
  - title: '🔧 Bakım & CI'
    labels:
      - 'type: chore'
      - 'github-actions'
  - title: '📦 Bağımlılıklar'
    labels:
      - 'dependencies'
      - 'nuget'
    collapse-after: 5

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'breaking-change'
  minor:
    labels:
      - 'type: feature'
      - 'type: enhancement'
  patch:
    labels:
      - 'type: bug'
      - 'type: performance'
      - 'type: security'
      - 'type: refactor'
      - 'type: docs'
      - 'type: chore'
      - 'dependencies'
  default: patch

exclude-labels:
  - 'skip-changelog'
  - 'status: duplicate'
  - 'status: wontfix'

autolabeler:
  - label: 'type: bug'
    title:
      - '/^fix(\(.+\))?:/i'
  - label: 'type: feature'
    title:
      - '/^feat(\(.+\))?:/i'
  - label: 'type: docs'
    title:
      - '/^docs(\(.+\))?:/i'
  - label: 'type: refactor'
    title:
      - '/^refactor(\(.+\))?:/i'
  - label: 'type: performance'
    title:
      - '/^perf(\(.+\))?:/i'
  - label: 'type: test'
    title:
      - '/^test(\(.+\))?:/i'
  - label: 'type: chore'
    title:
      - '/^(chore|build|ci)(\(.+\))?:/i'
  - label: 'type: security'
    title:
      - '/^security(\(.+\))?:/i'
  - label: 'breaking-change'
    title:
      - '/!:/'
      - '/BREAKING[ -]CHANGE/'

template: |
  ## 🎉 MKFiloServis-MultiDb $RESOLVED_VERSION

  $CHANGES

  ---

  **📦 İndirme:** [Releases sayfası](https://github.com/karamur/MKFiloServis-MultiDb/releases/tag/v$RESOLVED_VERSION)
  **📋 Tam Changelog:** [v$PREVIOUS_TAG...v$RESOLVED_VERSION](https://github.com/karamur/MKFiloServis-MultiDb/compare/v$PREVIOUS_TAG...v$RESOLVED_VERSION)

  > 💡 Kurulum, güncelleme ve katkı bilgileri için [README](https://github.com/karamur/MKFiloServis-MultiDb#readme) ve [CONTRIBUTING.md](https://github.com/karamur/MKFiloServis-MultiDb/blob/main/CONTRIBUTING.md)'yi inceleyin.

name: 🛡️ NuGet Vulnerability Audit

on:
  schedule:
    # Her Pazartesi 05:00 UTC (TR 08:00)
    - cron: '0 5 * * 1'
  push:
    branches: [main]
    paths:
      - '**/*.csproj'
      - '**/Directory.Packages.props'
      - '**/packages.lock.json'
  pull_request:
    branches: [main]
    paths:
      - '**/*.csproj'
      - '**/Directory.Packages.props'
      - '**/packages.lock.json'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  audit:
    name: 🔍 NuGet Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔷 Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore
        run: dotnet restore

      - name: 🔬 Vulnerable Paketleri Tara (transitive dahil)
        id: vuln
        shell: bash
        run: |
          set +e
          OUTPUT=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if echo "$OUTPUT" | grep -qE "has the following vulnerable packages"; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🗑️ Deprecated Paketleri Tara
        shell: bash
        run: |
          set +e
          dotnet list package --deprecated --include-transitive || true

      - name: 📄 Outdated Paketleri Listele (bilgi)
        shell: bash
        run: |
          set +e
          dotnet list package --outdated || true

      - name: ❌ Açık Bulunduysa Başarısız Ol
        if: steps.vuln.outputs.found == 'true' && github.event_name != 'schedule'
        run: |
          echo "::error::Vulnerable NuGet paketi tespit edildi. Lütfen güncelleyin."
          exit 1

      - name: 🐛 Issue Aç (sadece schedule + bulundu)
        if: steps.vuln.outputs.found == 'true' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.vuln.outputs.report }}`;
            const title = `🛡️ NuGet vulnerability tespit edildi (${new Date().toISOString().split('T')[0]})`;
            const body = [
              '## 🛡️ Haftalık NuGet Güvenlik Taraması',
              '',
              'Otomatik tarama bir veya daha fazla **vulnerable** paket tespit etti.',
              '',
              '### 📋 Rapor',
              '```',
              report,
              '```',
              '',
              '### ✅ Çözüm Adımları',
              '1. Etkilenen paketleri en son güvenli sürüme güncelleyin.',
              '2. `dotnet list package --vulnerable --include-transitive` ile doğrulayın.',
              '3. Bu issue\'yu kapatın.',
              '',
              `> 🤖 Bu issue **NuGet Audit** workflow'u tarafından otomatik açıldı.`,
            ].join('\n');

            // Aynı başlıkla açık issue varsa tekrar açma
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'type: security,dependencies',
            });
            const dup = existing.find(i => i.title.startsWith('🛡️ NuGet vulnerability tespit edildi'));
            if (dup) {
              core.info(`Mevcut issue güncelleniyor: #${dup.number}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['type: security', 'dependencies', 'priority: high'],
              });
            }


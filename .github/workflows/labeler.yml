name: 🏷️ Sync Labels

on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
      - .github/workflows/labeler.yml
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    name: 🔄 Etiketleri Senkronize Et
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Sync Labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false


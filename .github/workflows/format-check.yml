name: 🎨 Format Check

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '.editorconfig'
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  format:
    name: 🧹 dotnet format --verify-no-changes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔷 Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore
        run: dotnet restore

      - name: 🎨 Format Check
        run: |
          dotnet format --verify-no-changes --severity warn --verbosity diagnostic \
            || (echo "::error::Kod formatı .editorconfig ile uyumlu değil. Lokal olarak 'dotnet format' çalıştırıp commit'leyin." && exit 1)

